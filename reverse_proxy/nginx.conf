events {}

http {

    upstream circuloos_keycloak {
        server circuloos-platform-server.eurodyn.com:8090;  # Predefined server, replace with the appropriate IP or domain if necessary
    }
    upstream circuloos_kong {
        server kong:443;  # Predefined server, replace with the appropriate IP or domain if necessary
    }

    server {
        listen 80;
        server_name circuloos-platform-server.eurodyn.com;

        location /idm {
            rewrite ^/idm(.*) $1 break;  # Remove '/idm' from the request URI
            proxy_pass http://circuloos_keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /kong {
            rewrite ^/kong(.*) $1 break;  # Remove '/kong' from the request URI
            proxy_pass http://circuloos_kong;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            root /usr/share/nginx/html;  # Change the root path as per your directory structure
        }
    }
}